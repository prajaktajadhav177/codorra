name: cybershield_ai
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  clipboard: ^3.0.14
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  google_fonts: ^8.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  lottie: ^3.3.3
  permission_handler: ^12.0.1
  share_plus: ^13.1.0
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
  
  fonts:
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
